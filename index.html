<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotpotQA 数据分析平台</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.5.0/axios.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <h1 class="logo">🔍 HotpotQA 分析平台</h1>
            <ul class="nav-menu">
                <li><a href="#" class="nav-link active" data-section="dashboard">仪表板</a></li>
                <li><a href="#" class="nav-link" data-section="search">查询检索</a></li>
                <li><a href="#" class="nav-link" data-section="visualization">数据可视化</a></li>
                <li><a href="#" class="nav-link" data-section="clustering">聚类分析</a></li>
                <li><a href="#" class="nav-link" data-section="reasoning">推理链</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <section id="dashboard" class="section active">
            <h2>📊 数据概览</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 id="totalQuestions">-</h3>
                    <p>总问题数</p>
                </div>
                <div class="stat-card">
                    <h3 id="avgHops">-</h3>
                    <p>平均推理跳数</p>
                </div>
                <div class="stat-card">
                    <h3 id="typeBridge">-</h3>
                    <p>Bridge 类型</p>
                </div>
                <div class="stat-card">
                    <h3 id="typeComparison">-</h3>
                    <p>Comparison 类型</p>
                </div>
            </div>
            <div class="chart-container">
                <h3>问题类型分布</h3>
                <svg id="typeChart" width="100%" height="300"></svg>
            </div>
        </section>

        <section id="search" class="section">
            <h2>🔎 查询检索</h2>
            <div class="search-panel">
                <div class="filter-group">
                    <input type="text" id="searchQuery" placeholder="搜索问题或答案..." class="input-field">
                    <select id="typeFilter" class="select-field">
                        <option value="">所有类型</option>
                        <option value="bridge">Bridge</option>
                        <option value="comparison">Comparison</option>
                    </select>
                    <button id="searchBtn" class="btn btn-primary">搜索</button>
                </div>
            </div>
            <div id="searchResults" class="results-container"></div>
        </section>

        <section id="visualization" class="section">
            <h2>📈 可视化</h2>
            <div class="chart-container">
                <h3>答案长度分布</h3>
                <svg id="answerChart" width="100%" height="300"></svg>
            </div>
            <div class="chart-container">
                <h3>支持事实分布</h3>
                <svg id="factsChart" width="100%" height="300"></svg>
            </div>
        </section>

        <section id="clustering" class="section">
            <h2>🎯 聚类分析</h2>
            <button id="clusterBtn" class="btn btn-primary">执行聚类</button>
            <div id="clusterResults" class="cluster-container"></div>
        </section>

        <section id="reasoning" class="section">
            <h2>🔗 推理链</h2>
            <div class="reasoning-input">
                <input type="text" id="reasoningId" placeholder="输入问题 ID..." class="input-field">
                <button id="loadReasoningBtn" class="btn btn-primary">加载</button>
            </div>
            <div id="reasoningResult" class="reasoning-container"></div>
        </section>
    </main>

    <!-- 把 JS 放在 body 最后，保证 DOM 加载完再执行 -->
    <script src="js/app.js"></script>
</body>
</html>
